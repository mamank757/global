<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Peta Suhu Permukaan Global</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #060b13;
        }

        #map {
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        /* =========================
           PANEL KONTROL (GLASSMORPHISM)
        ========================= */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1200;
            background: rgba(8, 15, 30, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 600px;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #71f7ff;
            letter-spacing: 0.5px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Menggunakan tombol berbasis teks sesuai standar antarmuka */
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .action-btn.active {
            background: #0078ff;
            border-color: #0078ff;
            color: white;
            box-shadow: 0 0 10px rgba(0, 120, 255, 0.5);
        }

        /* =========================
           LEGENDA SKALA WARNA
        ========================= */
        .legend-container {
            margin-top: 20px;
            text-align: left;
        }

        .legend-title {
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
        }

        .color-bar {
            width: 100%;
            height: 12px;
            /* Gradien disesuaikan agar mirip dengan peta anomali laut (Biru - Putih - Merah) */
            background: linear-gradient(to right, 
                #1e6b8c 0%, 
                #75a7b8 25%, 
                #ffffff 50%, 
                #dca3a3 75%, 
                #ba1b2a 100%);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .scale-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="control-panel">
        <div class="panel-title">Peta Prakiraan Suhu Global</div>
        
        <div class="btn-group">
            <button class="action-btn active" onclick="switchLayer('suhu', this)">Suhu Global</button>
            <button class="action-btn" onclick="switchLayer('awan', this)">Tutupan Awan</button>
        </div>

        <div class="legend-container">
            <div class="legend-title" id="legendLabel">Perbedaan Suhu (°C)</div>
            <div class="color-bar" id="colorBar"></div>
            <div class="scale-labels" id="scaleLabels">
                <span>-4.0</span>
                <span>-2.0</span>
                <span>0.0</span>
                <span>+2.0</span>
                <span>+4.0</span>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // API Key OpenWeatherMap Anda
        const owmApiKey = "a6da7e4d60b79f9bc5e5a35f7ccc5885"; 

        // Inisialisasi peta Leaflet dengan tampilan global (zoom out)
        // Koordinat tengah diatur secara ekuatorial
        const map = L.map('map', { 
            zoomControl: false,
            worldCopyJump: true // Memastikan peta menyambung saat digeser terus ke samping
        }).setView([0, 120], 3); 

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Base Map Gelap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Menyimpan layer agar mudah di-switch
        let activeLayerName = 'suhu';
        let weatherLayers = {};

        // Layer Suhu (Temperature) dari OWM
        weatherLayers['suhu'] = L.tileLayer(`https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=${owmApiKey}`, { 
            opacity: 0.7,
            maxZoom: 18
        });

        // Layer Awan (Clouds) dari OWM sebagai pembanding
        weatherLayers['awan'] = L.tileLayer(`https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${owmApiKey}`, { 
            opacity: 0.6,
            maxZoom: 18
        });

        // Tampilkan layer suhu secara default
        weatherLayers['suhu'].addTo(map);

        // Fungsi untuk mengganti layer dan menyesuaikan legenda
        function switchLayer(mode, btnElement) {
            // Hapus layer lama
            if (weatherLayers[activeLayerName]) {
                map.removeLayer(weatherLayers[activeLayerName]);
            }
            
            // Tambahkan layer baru
            activeLayerName = mode;
            if (weatherLayers[mode]) {
                weatherLayers[mode].addTo(map);
            }

            // Update status tombol
            document.querySelectorAll('.action-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Update Legenda
            const colorBar = document.getElementById('colorBar');
            const scaleLabels = document.getElementById('scaleLabels');
            const legendLabel = document.getElementById('legendLabel');

            if (mode === 'suhu') {
                legendLabel.innerText = "Skala Suhu Global (°C)";
                colorBar.style.background = "linear-gradient(to right, #1e6b8c 0%, #75a7b8 25%, #ffffff 50%, #dca3a3 75%, #ba1b2a 100%)";
                scaleLabels.innerHTML = `
                    <span>Dingin</span>
                    <span>Sejuk</span>
                    <span>Normal</span>
                    <span>Hangat</span>
                    <span>Panas</span>
                `;
            } else if (mode === 'awan') {
                legendLabel.innerText = "Intensitas Tutupan Awan (%)";
                colorBar.style.background = "linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,1) 100%)";
                scaleLabels.innerHTML = `
                    <span>0% (Cerah)</span>
                    <span>50%</span>
                    <span>100% (Tertutup)</span>
                `;
            }
        }
    </script>
</body>
</html>
